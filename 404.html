<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            color: #1a365d; /* Un azul profesional, tipo logística */
            line-height: 1;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #2d3748;
        }

        p {
            color: #718096;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: #1a365d;
            color: white;
            padding: 0.8rem 2rem;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2c5282;
        }

        /* Pequeño detalle visual de carga/camioncito si querés */
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚚</div>
        <h1>404</h1>
        <h2>¡Ups! Tomamos el camino equivocado</h2>
        <p>La página que estás buscando no existe o fue movida a otra ruta. No te preocupes, podemos volver a la base.</p>
        <a href="./index.html" class="btn">Volver al Inicio</a>
    </div>

</body>
</html>
